<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dosen Pengajar - SIMPADU POLIBAN</title>
    <link rel="stylesheet" href="/Dashboard/admin_akademik/akademik.css" />
    <link rel="stylesheet" href="dosen.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <div id="sidebar-container"></div>

      <main class="main-content">
        <header class="content-header">
          <div class="header-title-area">
            <span class="breadcrumb">Akademik / Data Master</span>
            <h2>Dosen Pengajar</h2>
          </div>
          <div class="header-profile">
            <div class="profile-info">
              <span class="profile-name">Nabila Aulia</span>
              <span class="profile-role">Admin Academic</span>
            </div>
            <div class="profile-avatar">NA</div>
          </div>
        </header>

        <div class="data-card">
          <div class="filter-action-bar">
            <div class="search-box">
              <i class="fas fa-search search-icon"></i>
              <input
                type="text"
                id="search-dosen"
                placeholder="Cari nama dosen, mata kuliah, atau kelas..."
              />
            </div>

            <div class="filter-dropdowns">
              <select id="filter-tahun">
                <option>Tahun: 20262 (Genap)</option>
              </select>
              <select id="filter-prodi">
                <option value="">Pilih Program Studi</option>
              </select>
              <select id="filter-semester">
                <option value="">Pilih Semester</option>
              </select>
            </div>

            <button class="btn-primary" id="btn-tambah-dosen">
              <i class="fas fa-plus"></i> Tambah Dosen Pengajar
            </button>
          </div>

          <div class="table-container">
            <table class="styled-table">
              <thead>
                <tr>
                  <th>Dosen Pengajar (NIP/Nama)</th>
                  <th>Mata Kuliah</th>
                  <th>Kelas & Tahun</th>
                  <th>Peserta Kelas</th>
                  <th style="text-align: center">Aksi</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td
                    colspan="5"
                    style="text-align: center; padding: 40px; color: #64748b"
                  >
                    <i
                      class="fas fa-spinner fa-spin"
                      style="margin-right: 8px"
                    ></i>
                    Memuat data dosen pengajar...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="/Dashboard/admin_akademik/sidebar-loader.js"></script>
    <script src="dosen.js"></script>
  </body>
</html>
