<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jurusan & Prodi - SIMPADU POLIBAN</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="/Dashboard/admin_akademik/akademik.css" />
    <link rel="stylesheet" href="jurusan.css" />
  </head>
  <body>
    <div class="dashboard-layout-container">
      <div id="sidebar-container"></div>

      <main class="main-right-panel">
        <header class="main-topbar">
          <div class="topbar-left">
            <button id="menu-toggle" class="hamburger-menu-btn">
              <i class="fa-solid fa-bars" style="color: #2563eb;"></i>
            </button>
            <div class="breadcrumbs-nav">
              <span class="parent-bc">Akademik / Data Master /</span>
              <h1 class="current-page-title">Jurusan dan Program Studi</h1>
            </div>
          </div>

          <div class="topbar-right-profile">
            <div class="profile-meta">
              <span class="meta-name" id="topbar-user-name">Nabila Aulia</span>
              <span class="meta-role">Admin Academic</span>
            </div>
            <div class="profile-avatar-circle" id="topbar-avatar">NA</div>
          </div>
        </header>

        <section class="workspace-area">
          <div class="data-card-wrapper">
            
            <div class="tabs-navigation">
              <button class="tab-btn active" data-tab="jurusan">Daftar Jurusan</button>
              <button class="tab-btn" data-tab="prodi">Program Studi</button>
            </div>

            <div class="action-bar-block">
              <div class="search-box-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-input" placeholder="Cari nama jurusan..." />
              </div>
              
              <div class="filter-wrapper-buttons" style="display: flex; gap: 8px;">
                <button class="action-mini-btn-filter"><i class="fa-solid fa-arrow-down-wide-short"></i> Urutkan</button>
                <button class="action-mini-btn-filter"><i class="fa-solid fa-sliders"></i> Filter</button>
              </div>

              <button id="btn-tambah" class="add-data-btn">
                <i class="fas fa-plus"></i> Tambah Jurusan
              </button>
            </div>

            <div class="responsive-table-holder">
              <table class="data-academic-table">
                <thead>
                  <tr id="table-header-row"></tr>
                </thead>
                <tbody id="table-body">
                  <tr>
                    <td colspan="4" style="text-align: center; color: #64748b; padding: 40px">
                      Memuat data dari server VPS Poliban...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div id="pagination-info"></div>

          </div>
        </section>
      </main>
    </div>

    <script src="/Dashboard/admin_akademik/sidebar-loader.js"></script>
    <script src="jurusan.js"></script>
  </body>
</html>
