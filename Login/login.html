<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login SIMPADU</title>
    <link rel="stylesheet" href="loginstyle.css" />
  </head>
  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left">
        <div class="header">
          <img src="../Asset/logopoliban.png" alt="gambar" class="gambar" />
          <h2>SIMPADU POLIBAN</h2>
        </div>
        <h1>Welcome back.</h1>
        <p>Sistem Informasi Terpadu POLIBAN</p>

        <button class="google-btn">
          <img src="../Asset/logogoogle.png" alt="google" class="google" />
          Sign in with Google
        </button>
        <div class="divider">Or, sign in with your email</div>

        <form id="loginForm">
          <label>Email address</label>
          <input type="email" id="email" placeholder="Enter email" required />

          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required />

          <div class="options">
            <label><input type="checkbox" /> Keep me sign in</label>
            <a href="/Reset Password/reset.html">Forgot password?</a>
          </div>

          <button type="submit" class="login-btn">Login</button>
          
          <p class="signup">Don't have an account? <a href="/Sign_Up/signup.html">Sign up now</a></p>
        </form>
      </div> <!-- Penutup div class="left" -->

      <!-- RIGHT -->
      <div class="right">
        <img src="../Asset/logologin.png" alt="Illustration" />
      </div>
    </div>

    <script src="loginjava.js"></script>
  </body>
</html>
